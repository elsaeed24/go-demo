version: '3.9'

services:
  postgres:
    image: postgres:15

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: school

    ports:
      - "5433:5432"

  adminer:
    image: adminer

    restart: always

    ports:
      - "8081:8080"

    depends_on:
      - postgres